# Lab 6 CLI — PostgreSQL (e.g. Docker container postgres1, port 5432 on localhost).
# Create DB once: CREATE DATABASE ads_db;
logging.level.root=info
# Keep SQL off the console (tables + menu stay readable)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn

spring.main.banner-mode=off
spring.main.web-application-type=none

spring.datasource.url=jdbc:postgresql://localhost:5432/ads_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
