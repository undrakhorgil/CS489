name: Lab2a CI

on:
  push:
    paths:
      - "lab2a/**"
      - ".github/workflows/lab2a-ci.yml"
  pull_request:
    paths:
      - "lab2a/**"
      - ".github/workflows/lab2a-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build (Maven)
        run: mvn -f lab2a/pom.xml -B clean package

