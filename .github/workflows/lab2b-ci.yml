name: Lab2b

on:
  push:
    tags:
      - "lab2b-v*"
    paths:
      - "lab2b/**"
      - ".github/workflows/lab2b-ci.yml"
  pull_request:
    paths:
      - "lab2b/**"
      - ".github/workflows/lab2b-ci.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build (Maven)
        run: mvn -f lab2b/pom.xml -B clean package

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/lab2b-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build (Maven)
        run: mvn -f lab2b/pom.xml -B clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lab2b/target/lab2b-*.jar
          generate_release_notes: true

