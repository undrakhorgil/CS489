name: ADS CI

on:
  push:
    paths:
      - "ADS/**"
      - ".github/workflows/ads-ci.yml"
  pull_request:
    paths:
      - "ADS/**"
      - ".github/workflows/ads-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test (Maven)
        run: mvn -f ADS/pom.xml -B clean test
