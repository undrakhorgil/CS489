# DEVELOPMENT ENVIRONMENT PROPERTIES
server.port=8080

# LOCAL DEV DATABASE CONFIG SETTINGS
spring.config.import=optional:local_dev_database_config.properties

# Fallback local dev DB (when local_dev_database_config.properties is missing)
spring.datasource.url=jdbc:h2:mem:citylibrary_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# GraphQL Settings
# NOTE: For Development only. Set this to false in production
spring.graphql.graphiql.enabled=true
