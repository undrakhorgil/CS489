spring.application.name=ads-graphql-webapi

server.port=${ADS_PORT:8085}

spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# Default to a dedicated lab DB to avoid impacting other modules.
# Override when needed, e.g. ADS_DB_URL=jdbc:postgresql://postgres1:5432/ads_db
spring.datasource.url=${ADS_DB_URL:jdbc:postgresql://localhost:5432/ads_lab7b_db}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

