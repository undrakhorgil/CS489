# kubectl apply -k ADS/k8s
# See ADS/k8s/README.md for Minikube image build and access.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ads

resources:
  - namespace.yaml
  - postgres-secret.yaml
  - app-secret.yaml
  - postgres.yaml
  - backend.yaml
  - frontend-nginx-configmap.yaml
  - frontend.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: ads
    includeSelectors: false
