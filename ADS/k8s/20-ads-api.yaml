apiVersion: v1
kind: Service
metadata:
  name: ads-api
  namespace: ads
spec:
  type: NodePort
  selector:
    app: ads-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ads-api
  namespace: ads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ads-api
  template:
    metadata:
      labels:
        app: ads-api
    spec:
      containers:
        - name: ads-api
          image: ads-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://ads-postgres:5432/postgres
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ads-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ads-secrets
                  key: POSTGRES_PASSWORD
            - name: ADS_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ads-secrets
                  key: ADS_SECURITY_JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

