apiVersion: apps/v1
kind: Deployment
metadata:
  name: ads-backend
  namespace: ads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ads-backend
  template:
    metadata:
      labels:
        app: ads-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgresdb 5432; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: ads-backend
          image: ads-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresdb:5432/postgres
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: ADS_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ads-app-secret
                  key: jwt-secret
            # Matches Docker Compose; use port-forward http://localhost:8088 for the UI.
            - name: ADS_CORS_ALLOWED_ORIGINS
              value: http://localhost:8088,http://127.0.0.1:8088,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ads-backend
  namespace: ads
spec:
  selector:
    app: ads-backend
  ports:
    - port: 8080
      targetPort: 8080
