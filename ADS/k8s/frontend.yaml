apiVersion: apps/v1
kind: Deployment
metadata:
  name: ads-ui
  namespace: ads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ads-ui
  template:
    metadata:
      labels:
        app: ads-ui
    spec:
      initContainers:
        - name: wait-for-backend
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - "until curl -sf http://ads-backend:8080/api/v1/health; do echo waiting for API; sleep 3; done"
      containers:
        - name: nginx
          image: ads-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: ads-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: ads-ui
  namespace: ads
spec:
  type: NodePort
  selector:
    app: ads-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30088
