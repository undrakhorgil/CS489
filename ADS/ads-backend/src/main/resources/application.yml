spring:
  application:
    name: ads
  datasource:
    # Local Postgres on host port 5432 (e.g. `docker run ... -p 5432:5432` or host install).
    # We use the default `postgres` database to avoid requiring manual DB creation.
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    open-in-view: false
    hibernate:
      # Development default: recreate schema on each restart (no Flyway in this project).
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Dialect is chosen from JDBC URL
        globally_quoted_identifiers: true

server:
  port: 8080

ads:
  # Comma-separated list; browser origin must match when using credentials (JWT in headers).
  # Include :8088 for ADS Docker stack (nginx UI); :5173/:4173 for Vite dev/preview.
  cors:
    allowed-origins: http://localhost:8088,http://127.0.0.1:8088,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173
  security:
    jwt:
      # Replace this in real deployments. For jjwt HS256, use a long secret (>= 256 bits).
      secret: ${ADS_SECURITY_JWT_SECRET:change-me-to-a-long-random-secret-change-me-to-a-long-random-secret}
      expires-in-seconds: 3600

logging:
  level:
    edu.miu.cs.cs489appsd.ads: INFO
